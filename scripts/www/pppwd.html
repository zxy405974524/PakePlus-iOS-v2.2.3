<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <script>
            let pwdList = ['pakeplus', 'startPwd']
            // clear localStorage when start app
            // localStorage.clear()
            if (localStorage.getItem('appid') === '1') {
                window.location.replace('https://pakeplus.com/')
            }
        </script>
        <title>pwdTitle</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            :root {
                /* 默认：深色（iOS Dark） */
                --bg: linear-gradient(135deg, #1c1c1e, #2c2c2e);
                --card-bg: rgba(255, 255, 255, 0.08);
                --text: #ffffff;
                --input-bg: rgba(255, 255, 255, 0.1);
                --input-focus: rgba(255, 255, 255, 0.15);
                --placeholder: rgba(255, 255, 255, 0.4);
                --border-focus: rgba(0, 122, 255, 0.6);
                --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            }

            /* 白色主题 */
            .light {
                --bg: linear-gradient(135deg, #f2f2f7, #ffffff);
                --card-bg: rgba(255, 255, 255, 0.9);
                --text: #1c1c1e;
                --input-bg: rgba(0, 0, 0, 0.05);
                --input-focus: rgba(0, 0, 0, 0.08);
                --placeholder: rgba(0, 0, 0, 0.4);
                --border-focus: rgba(0, 122, 255, 0.6);
                --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            }

            html {
                background: var(--bg);
            }

            body {
                position: fixed;
                inset: 0;
                background: var(--bg);
                color: var(--text);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .flat {
                width: 90%;
                max-width: 380px;
                padding: 30px 24px;
                text-align: center;
                animation: fadeIn 0.6s ease;
            }

            /* card glass */
            .cardShadow {
                width: 90%;
                max-width: 380px;
                padding: 30px 24px;
                text-align: center;
                animation: fadeIn 0.6s ease;
                border-radius: 20px;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                background: var(--card-bg);
                box-shadow: var(--shadow);
            }

            /* 标题 */
            .title {
                font-size: 22px;
                font-weight: 600;
                margin-bottom: 24px;
            }
            /* 输入框 */
            .input {
                width: 100%;
                padding: 14px;
                border-radius: 10px;
                border: none;
                outline: none;
                font-size: 16px;
                margin-bottom: 16px;
                background: var(--input-bg);
                color: var(--text);
                transition: 0.2s;
            }
            .input::placeholder {
                color: var(--placeholder);
            }
            .input:focus {
                background: var(--input-focus);
                box-shadow: 0 0 0 2px var(--border-focus);
            }
            .tip {
                font-size: 14px;
                color: var(--text);
                opacity: 0.7;
                margin-top: 12px;
            }
            /* 按钮 */
            .button {
                width: 100%;
                padding: 14px;
                border-radius: 10px;
                border: none;
                font-size: 16px;
                font-weight: 500;
                background: linear-gradient(135deg, #0a84ff, #4facfe);
                color: #fff;
                cursor: pointer;
                transition: 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }
            .button:active {
                transform: scale(0.97);
            }
            /* 按钮禁用状态 */
            .button:disabled {
                opacity: 0.7;
                cursor: not-allowed;
                transform: none;
            }
            /* 加载动画 */
            .loading-spinner {
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-top: 2px solid #fff;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            /* 错误提示 */
            .error {
                /* margin-top: 12px; */
                font-size: 14px;
                color: #ff453a;
                opacity: 0;
                transition: 0.2s;
            }
            /* 适配 iPhone 底部安全区 */
            @supports (padding: max(0px)) {
                body {
                    padding-bottom: env(safe-area-inset-bottom);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body class="dark">
        <!-- 激活卡片 -->
        <div class="flat" id="cardBox">
            <div class="title" id="title">请输入密码</div>
            <input id="code" class="input" placeholder="请输入密码" />
            <button class="button" onclick="check()">
                <div id="loading"></div>
                <span id="button">验证</span>
            </button>
            <div class="tip" id="tip">提示内容</div>
            <div id="error" class="error">密码错误</div>
        </div>
        <script>
            window.onload = () => {
                // 设置样式
                if ('pwdTheme' === 'system') {
                    // document.body.classList.add('system')
                    const mediaQuery = window.matchMedia(
                        '(prefers-color-scheme: dark)'
                    )
                    if (mediaQuery) {
                        const listener = (e) => {
                            const newTheme = e.matches ? 'dark' : 'light'
                            document.body.classList.add(newTheme)
                        }
                        mediaQuery.addEventListener('change', listener)
                    }
                } else {
                    document.body.classList.add('pwdTheme')
                }
                document.getElementById('cardBox').classList.add('pwdStyle')
                // 设置标题
                document.getElementById('title').textContent = 'pwdTitle'
                document.getElementById('code').placeholder = 'pwdPlace'
                document.getElementById('button').textContent = 'pwdBtn'
                document.getElementById('tip').textContent = 'pwdTip'
                document.getElementById('error').textContent = 'pwdError'
                // 输入时清除错误提示
                const codeInput = document.getElementById('code')
                const error = document.getElementById('error')
                codeInput.addEventListener('input', () => {
                    error.style.opacity = 0
                })
            }

            function check() {
                const loading = document.getElementById('loading')
                const btn = document.getElementById('button')
                const val = document.getElementById('code').value.trim()
                const error = document.getElementById('error')
                loading.classList.add('loading-spinner')

                // 已加载中，直接返回防止重复点击
                if (btn.disabled) return

                // 隐藏错误提示
                error.style.opacity = 0

                // 开启Loading状态
                btn.disabled = true

                // 模拟验证延迟（更自然）
                setTimeout(() => {
                    if (pwdList.includes(val)) {
                        if ('startMethod' === 'oncePwd') {
                            localStorage.setItem('appid', '1')
                        } else {
                            localStorage.setItem('appid', '0')
                        }
                        window.location.replace('https://pakeplus.com/')
                    } else {
                        // 密码错误，恢复按钮
                        btn.disabled = false
                        error.style.opacity = 1
                        loading.classList.remove('loading-spinner')
                    }
                }, 300)
            }
            document.body.style.display = 'flex'
        </script>
    </body>
</html>
